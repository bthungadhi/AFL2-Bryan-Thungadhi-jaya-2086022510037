<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Shop - Recent Cafes</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }
        body { background-color: #ffffff; min-height: 100vh; }

        /* ========== NAVBAR ========== */
        nav {
            background-color: #4b3633; 
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-circle {
            background: #fff;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #33211f;
            overflow: hidden;
        }
        .logo-circle img { width: 85%; height: auto; object-fit: contain; }
        
        .search-container { flex: 1; max-width: 500px; margin: 0 2rem; position: relative; }
        .search-container input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            border-radius: 12px;
            border: none;
            background: #f5f5f5;
            font-size: 16px;
        }
        .search-container::before {
            content: "🔍";
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
        }
        .welcome-user { color: #ffffff; font-size: 22px; font-weight: bold; }

        /* ========== SIDEBAR (KONSISTEN SESUAI INSTRUKSI) ========== */
        .menu-trigger { padding: 15px 2rem; cursor: pointer; display: flex; flex-direction: column; gap: 4px; width: fit-content; }
        .menu-trigger span { width: 28px; height: 3px; background: #333; border-radius: 2px; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 200; }
        .sidebar {
            position: fixed; top: 0; left: 0; width: 250px; height: 100vh;
            background-color: #5d4a47; z-index: 300;
            transform: translateX(-100%); transition: 0.3s; padding: 20px 0;
        }
        .sidebar.active { transform: translateX(0); }
        .sidebar-item {
            padding: 15px 30px; display: flex; align-items: center; gap: 15px;
            color: #fff; text-decoration: none; font-size: 20px; font-weight: 500;
        }
        .sidebar-item span { filter: grayscale(1) brightness(0); } /* Emoji Hitam Pekat */
        .sidebar-item:hover { background: rgba(255,255,255,0.1); }

        /* ========== CONTENT: RECENT CAFES ========== */
        main { padding: 20px 3rem 4rem; max-width: 1400px; margin: 0 auto; }
        
        .page-title { font-size: 32px; font-weight: 700; color: #1a1a1a; margin-bottom: 30px; }

        .recent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        .cafe-card {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
            transition: transform 0.2s;
        }
        .cafe-card:hover { transform: translateY(-5px); }

        .img-container { position: relative; height: 220px; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        .btn-heart-white {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #fff;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: #ff4d4d;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .card-body { padding: 25px 20px; position: relative; }
        .card-body h3 { font-size: 20px; margin-bottom: 25px; color: #1a1a1a; }
        
        .location { 
            color: #888; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            font-weight: 500;
        }
        .location::before { content: "📍"; filter: grayscale(1); }

        .price {
            position: absolute;
            bottom: 25px;
            right: 20px;
            color: #c99a6d;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';

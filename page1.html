<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Shop - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }
        body { background-color: #ffffff; min-height: 100vh; overflow-x: hidden; }

        /* ========== NAVBAR ========== */
        nav {
            background-color: #4b3633; 
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-circle {
            background: #fff;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #33211f;
            overflow: hidden;
        }
        .logo-circle img { width: 85%; height: auto; object-fit: contain; }
        
        .search-container { flex: 1; max-width: 500px; margin: 0 2rem; position: relative; }
        .search-container input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            border-radius: 12px;
            border: none;
            background: #f5f5f5;
            font-size: 16px;
        }
        .search-container::before {
            content: "🔍";
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
        }
        .welcome-user { color: #ffffff; font-size: 22px; font-weight: bold; }

        /* ========== SIDEBAR (KONSISTEN) ========== */
        .menu-trigger { padding: 15px 2rem; cursor: pointer; display: flex; flex-direction: column; gap: 4px; width: fit-content; }
        .menu-trigger span { width: 28px; height: 3px; background: #333; border-radius: 2px; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 200; }
        .sidebar {
            position: fixed; top: 0; left: 0; width: 250px; height: 100vh;
            background-color: #5d4a47; z-index: 300;
            transform: translateX(-100%); transition: 0.3s; padding: 20px 0;
        }
        .sidebar.active { transform: translateX(0); }
        .sidebar-item {
            padding: 15px 30px; display: flex; align-items: center; gap: 15px;
            color: #fff; text-decoration: none; font-size: 20px; font-weight: 500;
        }
        .sidebar-item span { filter: grayscale(1) brightness(0); } /* Emoji Hitam */
        .sidebar-item:hover { background: rgba(255,255,255,0.1); }

        /* ========== MAIN CONTENT (PENYESUAIAN PRESISI) ========== */
        main { padding: 10px 2.5rem 4rem; max-width: 1400px; margin: 0 auto; }

        .layout-grid {
            display: flex;
            gap: 50px;
            align-items: flex-start;
            margin-top: 10px;
        }

        /* Banner Kiri (Bentuk Kapsul Vertical) */
        .banner-left {
            flex: 0 0 320px;
            height: 600px;
            border-radius: 100px; /* Membuat bentuk kapsul sempurna */
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .banner-left img { width: 100%; height: 100%; object-fit: cover; }

        /* Konten Kanan */
        .content-right { flex: 1; display: flex; flex-direction: column; gap: 40px; }

        /* Banner Atas (Bentuk Kapsul Horizontal) */
        .top-banners { display: flex; gap: 25px; }
        .banner-capsule {
            flex: 1;
            height: 220px;
            border-radius: 110px; /* Setengah dari height untuk oval sempurna */
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .banner-capsule img { width: 100%; height: 100%; object-fit: cover; }

        /* Section Recent Place */
        .section-header { margin-bottom: 20px; }
        .section-header h2 { font-size: 30px; font-weight: 800; color: #000; }

        .recent-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }
        .recent-card { text-align: center; }
        .recent-card .img-box {
            width: 100%;
            height: 200px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .recent-card .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .recent-card h3 { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 4px; }
        .recent-card p { font-size: 14px; color: #777; font-weight: 500; }

    </style>
</head>
<body>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
        }
